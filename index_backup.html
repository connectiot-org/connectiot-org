<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#007AFF;--gd:#005BBB;--bg:#F2F2F7;--sb:#F2F2F7;--pb:#FFFFFF;
  --hb:rgba(255,255,255,0.72);--bm:#0A84FF;--bt:#E5E5EA;--t1:#111111;--t2:#6E6E73;
  --t3:#8E8E93;--br:#E5E5EA;--ho:#EEF0F3;--f:'SF Pro Text','SF Pro Display','SF Pro Rounded',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --glass-border:rgba(60,60,67,0.18);--list-bg:#FFFFFF;--shadow:0 12px 30px rgba(15,23,42,0.08);
  --bubble-in-text:#111111;--bubble-out-text:#FFFFFF;--accent-soft:#E7F0FF;
  --bg-grad:radial-gradient(1200px 800px at 10% -10%, #FFFFFF 0%, #F2F2F7 55%, #E9EBF1 100%);
  --panel-grad:radial-gradient(900px 600px at 85% -15%, #FFFFFF 0%, #F7F8FC 55%, rgba(255,255,255,0) 100%);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg-grad);color:var(--t1);font-family:var(--f);font-size:15px;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px}
.app{display:flex;height:100vh;height:100dvh;width:100vw;overflow:hidden;position:relative;animation:appIn .45s ease-out;}

/* SIDEBAR */
.sidebar{width:360px;min-width:360px;display:flex;flex-direction:column;background:var(--sb);border-right:1px solid var(--br);box-shadow:12px 0 30px rgba(15,23,42,0.04);transition:transform .28s cubic-bezier(.4,0,.2,1);}
.s-head{padding:12px 16px;display:flex;align-items:center;gap:10px;background:var(--hb);border-bottom:1px solid var(--glass-border);backdrop-filter:blur(20px) saturate(160%);position:sticky;top:0;z-index:3}
.logo-icon{font-size:24px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.12))}
.logo-name{font-size:17px;font-weight:700;color:var(--g)}
.logo-sub{font-size:11px;color:var(--t3)}
.s-search{display:flex;align-items:center;gap:8px;margin:8px 12px;background:rgba(142,142,147,0.12);border-radius:12px;padding:10px 14px;border:1px solid var(--br);box-shadow:inset 0 1px 0 rgba(255,255,255,0.7);transition:box-shadow .2s,border-color .2s,background .2s}
.s-search:focus-within{background:#fff;border-color:rgba(0,122,255,0.35);box-shadow:0 0 0 3px rgba(0,122,255,0.12)}
.s-search input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-family:var(--f);font-size:14px;}
.s-search input::placeholder{color:var(--t3)}
.s-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 0 16px;}
.s-item{display:flex;align-items:center;gap:12px;padding:12px 16px;margin:8px 12px;cursor:pointer;border:1px solid var(--br);border-radius:14px;background:var(--list-bg);box-shadow:0 8px 18px rgba(15,23,42,0.06);transition:background .15s,transform .2s,box-shadow .2s,border-color .2s;user-select:none;animation:listIn .35s ease both;animation-delay:calc(var(--i) * 20ms);}
.s-item:hover,.s-item:active{background:var(--ho)}
.s-item:active{transform:scale(0.99);box-shadow:0 4px 10px rgba(15,23,42,0.06)}
.s-item.active{background:var(--accent-soft);border-color:rgba(0,122,255,0.4);box-shadow:0 10px 22px rgba(0,122,255,0.12)}
.av{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid #fff;box-shadow:0 4px 10px rgba(15,23,42,0.12)}
.av-f{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0;border:2px solid #fff;box-shadow:0 4px 10px rgba(15,23,42,0.12)}
.s-info{flex:1;min-width:0}
.s-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.s-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-date{font-size:11px;color:var(--t3);flex-shrink:0;margin-left:8px}
.s-prev{font-size:13px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--pb);position:relative;}
.main::before{content:"";position:absolute;inset:0;background:var(--panel-grad);opacity:.75;pointer-events:none;}
.main>*{position:relative;z-index:1}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--t2);padding:20px;text-align:center;}
.empty-icon{font-size:64px;opacity:.35}
.empty h2{font-size:20px;font-weight:600;color:var(--t1)}
.empty p{font-size:14px}

/* CHAT */
.c-head{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--hb);border-bottom:1px solid var(--glass-border);backdrop-filter:blur(20px) saturate(160%);flex-shrink:0;position:sticky;top:0;z-index:3;box-shadow:0 10px 22px rgba(15,23,42,0.06);}
.back-btn{display:none;background:none;border:none;color:var(--g);font-size:22px;padding:4px 8px 4px 0;cursor:pointer;flex-shrink:0;line-height:1;}
.c-head-info{flex:1;min-width:0;}
.c-name{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-role{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 64px 22px;display:flex;flex-direction:column;gap:6px;}
.date-sep{text-align:center;margin:12px 0}
.date-sep span{background:rgba(255,255,255,0.85);padding:4px 12px;border-radius:999px;font-size:11px;color:var(--t3);border:1px solid var(--br);box-shadow:0 6px 14px rgba(15,23,42,0.05)}
.bubble{max-width:68%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;box-shadow:0 2px 8px rgba(15,23,42,0.08);animation:bubbleIn .25s ease-out both;animation-delay:calc(var(--i) * 18ms);}
.b-them{background:var(--bt);color:var(--bubble-in-text);align-self:flex-start;border-bottom-left-radius:6px}
.b-me{background:var(--bm);color:var(--bubble-out-text);align-self:flex-end;border-bottom-right-radius:6px;box-shadow:0 6px 16px rgba(10,132,255,0.25)}
.b-time{font-size:11px;color:rgba(0,0,0,0.4);text-align:right;margin-top:2px}
.b-me .b-time{color:rgba(255,255,255,0.75)}
.b-link{color:#007AFF}

@keyframes appIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes listIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes bubbleIn{from{opacity:0;transform:translateY(10px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none !important;transition:none !important;}
}

/* ── MOBILE ── */
@media(max-width:700px){
  .app{flex-direction:column;}

  /* Sidebar fills full screen, slides in from left */
  .sidebar{
    position:absolute;top:0;left:0;
    width:100%;height:100%;
    z-index:20;
    transform:translateX(0);
    padding-top:var(--safe-top);
  }
  .sidebar.hidden{
    transform:translateX(-100%);
    pointer-events:none;
  }

  /* Chat panel also fills full screen */
  .main{
    position:absolute;top:0;left:0;
    width:100%;height:100%;
    z-index:10;
    padding-bottom:var(--safe-bottom);
  }

  /* Header spacing */
  .s-head{
    padding: calc(12px + var(--safe-top)) 16px 12px;
  }

  /* Bigger touch targets in the list */
  .s-item{
    padding:14px 16px;
    min-height:72px;
    margin:8px 10px;
  }
  .av,.av-f{width:50px;height:50px;}
  .s-name{font-size:16px;}
  .s-prev{font-size:13px;}

  /* Back button visible on mobile */
  .back-btn{display:flex;align-items:center;}

  /* Chat messages narrower padding */
  .c-msgs{padding:12px 14px 16px;gap:6px;}

  /* Bubbles can be wider on small screens */
  .bubble{max-width:82%;font-size:14px;}

  /* Chat header */
  .c-head{padding:10px 12px;gap:8px;}
  .c-name{font-size:15px;}
  .c-role{font-size:11px;}

  /* Search input bigger tap area */
  .s-search{margin:8px 12px;padding:10px 14px;border-radius:10px;}
  .s-search input{font-size:16px;} /* 16px prevents iOS zoom on focus */
}

.msg-count-badge{
  font-size:10px;color:var(--t3);background:rgba(142,142,147,0.12);
  padding:2px 7px;border-radius:99px;margin-left:6px;flex-shrink:0;
}
.stats-bar{
  padding:8px 16px;font-size:12px;color:var(--t3);
  border-bottom:1px solid var(--br);background:rgba(255,255,255,0.5);
  backdrop-filter:blur(10px);display:flex;align-items:center;gap:6px;
}
.stats-bar span{font-weight:600;color:var(--g)}
</style>

<script src="elon-data.js"></script>
<script>
var contacts = JSON.parse(document.getElementById('contactsData').textContent);
var convosIndex = {};
var convosCache = {};
var convosIndexLoaded = false;
var convosIndexPromise = null;

var convosIndexEl = document.getElementById('convosIndex');
if (convosIndexEl && convosIndexEl.textContent.trim()) {
  try {
    convosIndex = JSON.parse(convosIndexEl.textContent);
    convosIndexLoaded = Object.keys(convosIndex).length > 0;
  } catch (err) {
    convosIndex = {};
  }
}

function normalizeBody(text) {
  return String(text || '').replace(/\s+/g, ' ').trim();
}

function parseRoleCount(role) {
  var match = String(role || '').match(/\d+/);
  return match ? parseInt(match[0], 10) : 0;
}

function messageKey(msg) {
  return [
    msg && msg.from ? msg.from : '',
    msg && msg.time ? msg.time : '',
    msg && msg.date ? msg.date : '',
    normalizeBody(msg && msg.text ? msg.text : '')
  ].join('|');
}

function dedupeMessages(list) {
  var seen = Object.create(null);
  var out = [];
  for (var i = 0; i < list.length; i++) {
    var msg = list[i];
    var key = messageKey(msg);
    if (seen[key]) continue;
    seen[key] = true;
    out.push(msg);
  }
  return out;
}


var pinnedIds = ['elon-musk', 'bill-gates'];
var pinnedOrder = {};
for (var i = 0; i < pinnedIds.length; i++) {
  pinnedOrder[pinnedIds[i]] = i;
}

var contactOrder = {};
function buildContactOrder() {
  contactOrder = {};
  for (var i = 0; i < contacts.length; i++) {
    contactOrder[contacts[i].id] = i;
  }
}

function upsertContact(contact) {
  if (!contact || !contact.id) return;
  for (var i = 0; i < contacts.length; i++) {
    if (contacts[i].id === contact.id) {
      Object.assign(contacts[i], contact);
      return;
    }
  }
  contacts.push(contact);
}

function upsertConversation(id, conv) {
  if (!id || !conv) return;
  var base = convosCache[id] || { msgs: [] };
  var next = Object.assign({}, base, conv);
  if (Array.isArray(next.msgs)) {
    next.msgs = dedupeMessages(next.msgs);
  }
  convosCache[id] = next;
  var currentMeta = convosIndex[id] || {};
  var preview = next.preview;
  if (!preview && Array.isArray(next.msgs) && next.msgs.length) {
    preview = next.msgs[next.msgs.length - 1].text || '';
  }
  convosIndex[id] = Object.assign({}, currentMeta, {
    last: next.last || currentMeta.last || '',
    preview: preview || currentMeta.preview || '',
    count: Array.isArray(next.msgs) ? next.msgs.length : 0
  });
}

function applyContactOverrides(overrides) {
  var keys = Object.keys(overrides || {});
  for (var i = 0; i < keys.length; i++) {
    var id = keys[i];
    upsertContact(Object.assign({ id: id }, overrides[id]));
  }
}

// Load message metadata on demand to keep the initial payload small.
function loadConvosIndex() {
  if (convosIndexPromise) return convosIndexPromise;
  convosIndexPromise = fetch('data/convos-index.json', { cache: 'force-cache' })
    .then(function(res) {
      if (!res.ok) throw new Error('Failed to load conversation index');
      return res.json();
    })
    .then(function(data) {
      convosIndex = data || {};
      convosIndexLoaded = true;
      updateStats();
      renderList();
      return convosIndex;
    })
    .catch(function(err) {
      console.warn('Unable to load conversation index', err);
      return convosIndex;
    });
  return convosIndexPromise;
}

function loadConversation(id) {
  if (convosCache[id]) return Promise.resolve(convosCache[id]);
  return loadConvosIndex().then(function() {
    var meta = convosIndex[id];
    if (!meta || !meta.file) {
      throw new Error('Missing conversation file for ' + id);
    }
    return fetch('data/convos/' + meta.file)
      .then(function(res) {
        if (!res.ok) throw new Error('Failed to load conversation');
        return res.json();
      })
      .then(function(conv) {
        conv.msgs = Array.isArray(conv.msgs) ? dedupeMessages(conv.msgs) : [];
        convosCache[id] = conv;
        return conv;
      });
  });
}

function sortContacts(a, b) {
  var aPinned = pinnedOrder.hasOwnProperty(a.id);
  var bPinned = pinnedOrder.hasOwnProperty(b.id);
  if (aPinned && bPinned) return pinnedOrder[a.id] - pinnedOrder[b.id];
  if (aPinned) return -1;
  if (bPinned) return 1;
  var aIndex = contactOrder[a.id];
  var bIndex = contactOrder[b.id];
  if (aIndex == null) aIndex = Number.MAX_SAFE_INTEGER;
  if (bIndex == null) bIndex = Number.MAX_SAFE_INTEGER;
  return aIndex - bIndex;
}

if (window.__elonData && window.__elonData.contact) {
  upsertContact(window.__elonData.contact);
  if (window.__elonData.conversation) {
    upsertConversation(window.__elonData.contact.id, window.__elonData.conversation);
  }
}

function updateStats() {
  var keys = Object.keys(convosIndex || {});
  var totalMessages = 0;
  if (keys.length) {
    for (var i = 0; i < keys.length; i++) {
      var meta = convosIndex[keys[i]];

    }
  } else {
    for (var j = 0; j < contacts.length; j++) {
      totalMessages += parseRoleCount(contacts[j].role);
    }
  }
  var convosEl = document.getElementById('statsConvos');
  var messagesEl = document.getElementById('statsMessages');
  var convoCount = keys.length || contacts.length;
  if (convosEl) convosEl.textContent = convoCount.toLocaleString();
  if (messagesEl) messagesEl.textContent = totalMessages.toLocaleString();
}

var COLORS=['#1a5276','#1e8449','#7b241c','#6c3483','#1a5276','#0e6655','#784212','#1f618d'];
function colorFn(n){ return COLORS[n.charCodeAt(0) % COLORS.length]; }
function initials(n){
  return n.replace(/Maybe:\s*/i,'').split(' ').filter(function(_,i){return i<2;}).map(function(w){return w[0]||'';}).join('').toUpperCase();
}

function esc(str) {
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

var activeId = null;
var MAX_RENDER_MESSAGES = 300;

function avHtml(c, size) {
  size = size || 46;
  var s = 'width:'+size+'px;height:'+size+'px';
  if (c.avatar) {
    return '<img class="av" src="'+esc(c.avatar)+'" alt="'+esc(c.name)+'" style="'+s+'" loading="lazy">';
  }
  return '<div class="av-f" style="'+s+';background:'+colorFn(c.name)+'">'+initials(c.name)+'</div>';
}

function renderList() {
  var q = document.getElementById('search').value.toLowerCase();
  var filtered = contacts.filter(function(c){ return c.name.toLowerCase().indexOf(q) !== -1; });
  filtered.sort(sortContacts);
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var c = filtered[i];
    var meta = convosIndex[c.id];
    var msgCount = meta && typeof meta.count === 'number' ? meta.count : parseRoleCount(c.role);
    var prevRaw = meta && meta.preview ? meta.preview : '';
    prevRaw = normalizeBody(prevRaw);
    if (!prevRaw) prevRaw = msgCount ? 'Tap to load messages' : 'No messages yet';
    var prev = esc(prevRaw.substring(0, 50));
    var lastDate = meta && meta.last ? meta.last : '';
    html += '<div class="s-item'+(activeId===c.id?' active':'')+'" style="--i:'+Math.min(i,20)+'" onclick="openChat(\''+c.id+'\')">' +
      '<div style="display:flex;flex-shrink:0">'+avHtml(c)+'</div>' +
      '<div class="s-info">' +
        '<div class="s-row"><span class="s-name">'+esc(c.name)+'</span><span class="msg-count-badge">'+msgCount+'</span><span class="s-date">'+esc(lastDate)+'</span></div>' +
        '<div class="s-prev">'+prev+'</div>' +
      '</div>' +
    '</div>';
  }
  document.getElementById('list').innerHTML = html;
}

function openChat(id) {
  activeId = id;
  renderList();
  var c = contacts.find(function(x){ return x.id === id; });
  if (!c) return;

  document.getElementById('empty').style.display = 'none';
  var chat = document.getElementById('chat');
  chat.style.display = 'flex';
  chat.style.flexDirection = 'column';
  chat.style.overflow = 'hidden';
  chat.style.flex = '1';

  var headerHtml =
    '<div class="c-head">' +
      '<button class="back-btn" id="back-btn" onclick="goBack()" aria-label="Back to contacts">&#8592;</button>' +
      '<div style="display:flex;flex-shrink:0">'+avHtml(c,40)+'</div>' +
      '<div class="c-head-info"><div class="c-name">'+esc(c.name)+'</div><div class="c-role">Loading…</div></div>' +
    '</div>';

  chat.innerHTML = headerHtml +
    '<div class="empty" style="flex:1">' +
      '<div class="empty-icon">💬</div>' +
      '<h2>Loading messages…</h2>' +
      '<p>This can take a moment on first open.</p>' +
    '</div>';

  loadConversation(id)
    .then(function(cv) {
      var msgs = Array.isArray(cv.msgs) ? cv.msgs : [];
      var totalCount = msgs.length;
      var renderMsgs = msgs;
      var trimmed = false;
      if (msgs.length > MAX_RENDER_MESSAGES) {
        renderMsgs = msgs.slice(msgs.length - MAX_RENDER_MESSAGES);
        trimmed = true;
      }

      var nextHeader =
        '<div class="c-head">' +
          '<button class="back-btn" id="back-btn" onclick="goBack()" aria-label="Back to contacts">&#8592;</button>' +
          '<div style="display:flex;flex-shrink:0">'+avHtml(c,40)+'</div>' +
          '<div class="c-head-info"><div class="c-name">'+esc(c.name)+'</div><div class="c-role">'+totalCount+' messages</div></div>' +
        '</div>';

      if (!msgs.length) {
        chat.innerHTML = nextHeader +
          '<div class="empty" style="flex:1">' +
            '<div class="empty-icon">💬</div>' +
            '<h2>No messages yet</h2>' +
            '<p>This conversation does not have any messages.</p>' +
          '</div>';

        if (window.innerWidth <= 700) {
          document.getElementById('sidebar').classList.add('hidden');
        }
        return;
      }

      var lastDate = '';
      var msgsHtml = '';
      if (trimmed) {
        msgsHtml += '<div class="date-sep"><span>Showing last '+renderMsgs.length+' of '+totalCount+'</span></div>';
      }
      for (var i = 0; i < renderMsgs.length; i++) {
        var m = renderMsgs[i];
        var sep = '';
        if (m.date && m.date !== lastDate) {
          lastDate = m.date;
          sep = '<div class="date-sep"><span>'+m.date+'</span></div>';
        }
        var bubbleClass = m.from === 'me' ? 'b-me' : 'b-them';
        var bodyText = esc(m.text || '').replace(/\r?\n/g, '<br>');
        var timeLabel = m.time ? esc(m.time) : '';
        var timeSuffix = (m.from === 'me' && timeLabel) ? ' ✓✓' : '';
        var timeHtml = timeLabel ? '<div class="b-time">'+timeLabel+timeSuffix+'</div>' : '';
        msgsHtml += sep + '<div class="bubble '+bubbleClass+'" style="--i:'+Math.min(i,30)+'">'+bodyText+timeHtml+'</div>';
      }

      chat.innerHTML = nextHeader + '<div class="c-msgs" id="msgs">'+msgsHtml+'</div>';

      var el = document.getElementById('msgs');
      el.scrollTop = el.scrollHeight;

      if (window.innerWidth <= 700) {
        document.getElementById('sidebar').classList.add('hidden');
      }
    })
    .catch(function(err) {
      console.warn('Failed to load conversation', err);
      chat.innerHTML = headerHtml +
        '<div class="empty" style="flex:1">' +
          '<div class="empty-icon">💬</div>' +
          '<h2>Unable to load messages</h2>' +
          '<p>Please refresh or try again.</p>' +
        '</div>';

      if (window.innerWidth <= 700) {
        document.getElementById('sidebar').classList.add('hidden');
      }
    });
}

function goBack() {
  document.getElementById('sidebar').classList.remove('hidden');
  var chat = document.getElementById('chat');
  if (window.innerWidth <= 700) {
    chat.style.display = 'none';
    document.getElementById('empty').style.display = 'flex';
    activeId = null;
    renderList();
  }
}

window.addEventListener('resize', function() {
  if (window.innerWidth > 700) {
    document.getElementById('sidebar').classList.remove('hidden');
  }
});

updateStats();
renderList();
loadConvosIndex();
</script>
</body>
</html>
